<main class="tablero">
    <header class="pagina-header">
        <h1 class="pagina-header__titulo">Clientes</h1>
        <div class="buscador">
            <div class="buscador__campo">
                <i class="fa-solid fa-magnifying-glass buscador__icono"></i>
                <input type="text" class="buscador__input" placeholder="Buscar por nombre, documento o correo...">
            </div>
            <div class="buscador__filtros">
                <select class="buscador__select" name="filtro-estado" title="Filtrar por estado">
                    <option value="">Estado</option>
                    <option value="activo">Activo</option>
                    <option value="inactivo">Inactivo</option>
                </select>
            </div>
        </div>
        <div class="pagina-header__acciones">
            <a href="#" data-modal-open="modal-agregar-cliente" class="boton-accion boton-accion--primario" title="Agregar Cliente">
                <i class="fa-solid fa-plus"></i>
                Agregar Cliente
            </a>
        </div>
    </header>

    <section class="contactos__grid">
        <!-- Las tarjetas se renderizan dinámicamente desde clientes.js -->
    </section>
</main>

<div id="modal-agregar-cliente" class="modal">
    <a href="#" class="modal__overlay" title="Cerrar"></a>
    <div class="modal__contenedor">
        <div class="modal__header">
            <h2 class="modal__titulo">Agregar Cliente</h2>
            <a href="#" class="modal__cerrar" data-modal-close title="Cerrar">
                <i class="fa-solid fa-xmark"></i>
            </a>
        </div>
        <div class="modal__formulario">
            <div class="formulario__grupo">
                <label class="formulario__label" for="agregar-cliente-nombre">Nombre Completo</label>
                <input type="text" id="agregar-cliente-nombre" class="formulario__input formulario__campo" placeholder="Ej: María García López" title="Nombre Completo" data-validation="letras" required>
            </div>
            <div class="formulario__grupo">
                <label class="formulario__label" for="agregar-cliente-documento">Documento (Cédula)</label>
                <input type="text" id="agregar-cliente-documento" class="formulario__input formulario__campo" placeholder="Ej: 1234567890" title="Documento (Cédula)" data-validation="numerosEnteros" required>
            </div>
            <div class="formulario__grupo">
                <label class="formulario__label" for="agregar-cliente-correo">Correo Electrónico</label>
                <input type="email" id="agregar-cliente-correo" class="formulario__input formulario__campo" placeholder="Ej: correo@ejemplo.com" title="Correo Electrónico" data-validation="correo" required>
            </div>
            <div class="formulario__fila">
                <div class="formulario__grupo">
                    <label class="formulario__label" for="agregar-cliente-telefono">Teléfono</label>
                    <input type="tel" id="agregar-cliente-telefono" class="formulario__input formulario__campo" placeholder="Ej: 3001234567" title="Teléfono" data-validation="telefono" required>
                </div>
                <div class="formulario__grupo">
                    <label class="formulario__label" for="agregar-cliente-ciudad">Ciudad</label>
                    <input type="text" id="agregar-cliente-ciudad" class="formulario__input formulario__campo" placeholder="Ej: Bogotá" title="Ciudad" data-validation="letras" required>
                </div>
            </div>
            <div class="formulario__grupo">
                <label class="formulario__label" for="agregar-cliente-direccion">Dirección</label>
                <input type="text" id="agregar-cliente-direccion" class="formulario__input formulario__campo" placeholder="Ej: Cra 45 #32-10" title="Dirección" data-validation="texto" required>
            </div>
            <div class="formulario__acciones">
                <a href="#" class="boton-accion boton-accion--secundario" data-modal-close title="Cancelar">Cancelar</a>
                <button type="button" id="btn-guardar-cliente" class="boton-accion boton-accion--primario" title="Guardar Cliente">
                    Guardar Cliente
                </button>
            </div>
        </div>
    </div>
</div>

<div id="modal-editar-cliente" class="modal">
    <a href="#" class="modal__overlay" title="Cerrar"></a>
    <div class="modal__contenedor">
        <div class="modal__header">
            <h2 class="modal__titulo">Editar Cliente</h2>
            <a href="#" class="modal__cerrar" data-modal-close title="Cerrar">
                <i class="fa-solid fa-xmark"></i>
            </a>
        </div>
        <div class="modal__formulario">
            <div class="formulario__grupo">
                <label class="formulario__label" for="editar-cliente-nombre">Nombre Completo</label>
                <input type="text" id="editar-cliente-nombre" class="formulario__input formulario__campo" title="Nombre Completo" data-validation="letras" required>
            </div>
            <div class="formulario__grupo">
                <label class="formulario__label" for="editar-cliente-documento">Documento (Cédula)</label>
                <input type="text" id="editar-cliente-documento" class="formulario__input formulario__campo" title="Documento (Cédula)" data-validation="numerosEnteros" required>
            </div>
            <div class="formulario__grupo">
                <label class="formulario__label" for="editar-cliente-correo">Correo Electrónico</label>
                <input type="email" id="editar-cliente-correo" class="formulario__input formulario__campo" title="Correo Electrónico" data-validation="correo" required>
            </div>
            <div class="formulario__fila">
                <div class="formulario__grupo">
                    <label class="formulario__label" for="editar-cliente-telefono">Teléfono</label>
                    <input type="tel" id="editar-cliente-telefono" class="formulario__input formulario__campo" title="Teléfono" data-validation="telefono" required>
                </div>
                <div class="formulario__grupo">
                    <label class="formulario__label" for="editar-cliente-ciudad">Ciudad</label>
                    <input type="text" id="editar-cliente-ciudad" class="formulario__input formulario__campo" title="Ciudad" data-validation="letras" required>
                </div>
            </div>
            <div class="formulario__grupo">
                <label class="formulario__label" for="editar-cliente-direccion">Dirección</label>
                <input type="text" id="editar-cliente-direccion" class="formulario__input formulario__campo" title="Dirección" data-validation="texto" required>
            </div>
            <div class="formulario__grupo">
                <label class="formulario__label" for="editar-cliente-estado">Estado</label>
                <select id="editar-cliente-estado" class="formulario__select" title="Estado" data-required>
                    <option value="true">Activo</option>
                    <option value="false">Inactivo</option>
                </select>
            </div>
            <div class="formulario__acciones">
                <a href="#" class="boton-accion boton-accion--secundario" data-modal-close title="Cancelar">Cancelar</a>
                <button type="button" id="btn-actualizar-cliente" class="boton-accion boton-accion--primario" title="Actualizar Cliente">
                    Actualizar Cliente
                </button>
            </div>
        </div>
    </div>
</div>
