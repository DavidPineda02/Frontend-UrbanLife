<main class="tablero">
    <header class="pagina-header">
        <h1 class="pagina-header__titulo">Gastos Adicionales</h1>
        <div class="buscador">
            <div class="buscador__campo">
                <i class="fa-solid fa-magnifying-glass buscador__icono"></i>
                <input type="text" class="buscador__input" placeholder="Buscar por descripción de gasto...">
            </div>
            <div class="buscador__filtros">
                <select class="buscador__select" name="filtro-metodo" title="Filtrar por método de pago">
                    <option value="">Método de pago</option>
                    <option value="Transferencia">Transferencia</option>
                    <option value="Efectivo">Efectivo</option>
                </select>
                <select class="buscador__select" name="filtro-periodo" title="Filtrar por período">
                    <option value="">Período</option>
                    <option value="today">Hoy</option>
                    <option value="week">Esta semana</option>
                    <option value="month">Este mes</option>
                    <option value="year">Este año</option>
                </select>
            </div>
        </div>
        <div class="pagina-header__acciones">
            <a href="#" data-modal-open="modal-gasto" class="boton-accion boton-accion--primario" title="Agregar Gasto">
                <i class="fa-solid fa-plus"></i>
                <span>Registrar Gasto</span>
            </a>
        </div>
    </header>

    <section class="ventas-contenido">
        <div class="tabla__contenedor">
            <table class="tabla">
                <thead class="tabla__cabecera">
                    <tr>
                        <th class="tabla__th">ID</th>
                        <th class="tabla__th">Fecha</th>
                        <th class="tabla__th">Método de Pago</th>
                        <th class="tabla__th">Descripción</th>
                        <th class="tabla__th">Monto</th>
                        <th class="tabla__th">Acciones</th>
                    </tr>
                </thead>
                <tbody class="tabla__cuerpo">
                    <!-- Las filas se renderizan dinamicamente desde gastos.js -->
                </tbody>
            </table>
        </div>
    </section>
</main>

<div class="modal" id="modal-gasto">
    <a href="#" class="modal__overlay" title="Cerrar"></a>
    <div class="modal__contenedor">
        <div class="modal__header">
            <h2 class="modal__titulo">Registrar Gasto</h2>
            <a href="#" class="modal__cerrar" data-modal-close title="Cerrar">
                <i class="fa-solid fa-xmark"></i>
            </a>
        </div>
        <form class="modal__formulario">
            <div class="formulario__fila">
                <div class="formulario__grupo">
                    <label class="formulario__label">Fecha</label>
                    <input type="date" class="formulario__input" name="fecha" title="Fecha" required>
                </div>
                <div class="formulario__grupo">
                    <label class="formulario__label">Monto</label>
                    <input type="text" class="formulario__input" name="monto" placeholder="$ 0" title="Monto" data-validation="numeros" required>
                </div>
            </div>
            <div class="formulario__fila">
                <div class="formulario__grupo">
                    <label class="formulario__label">Descripción</label>
                    <input type="text" class="formulario__input" name="descripcion"
                        placeholder="Ej: Pago de energía eléctrica" title="Descripción" data-validation="texto" required>
                </div>
                <div class="formulario__grupo">
                    <label class="formulario__label">Método de Pago</label>
                    <select class="formulario__select" name="metodo_pago" title="Método de Pago" data-required>
                        <option value="">Seleccionar método</option>
                        <option value="Efectivo">Efectivo</option>
                        <option value="Transferencia">Transferencia</option>
                    </select>
                </div>
            </div>
            <div class="formulario__acciones">
                <a href="#" class="boton-accion boton-accion--secundario" data-modal-close title="Cancelar">Cancelar</a>
                <button type="submit" class="boton-accion boton-accion--primario" title="Guardar Gasto">Guardar Gasto</button>
            </div>
        </form>
    </div>
</div>

<!-- ===== DETALLE DE GASTO ===== -->
<div class="modal modal--detalle" id="modal-detalle-gasto">
    <a href="#" class="modal__overlay" title="Cerrar"></a>
    <div class="modal__contenedor">
        <div class="modal__header">
            <h2 class="modal__titulo">Detalle de Gasto</h2>
            <span class="modal__subtitulo"></span>
            <a href="#" class="modal__cerrar" data-modal-close title="Cerrar">
                <i class="fa-solid fa-xmark"></i>
            </a>
        </div>

        <table class="factura__tabla">
            <thead>
                <tr class="factura__tabla-header">
                    <th class="factura__tabla-th">Campo</th>
                    <th class="factura__tabla-th">Detalle</th>
                </tr>
            </thead>
            <tbody>
                <!-- Las filas se renderizan dinámicamente desde gastos.js -->
            </tbody>
        </table>

        <div class="factura__total">
            <span class="factura__total-label">Total</span>
            <span class="factura__total-valor">$ ---</span>
        </div>

        <div class="factura__acciones factura__acciones--centrado">
            <a href="#" class="factura__boton-volver" data-modal-close title="Volver">Volver</a>
        </div>
    </div>
</div>
