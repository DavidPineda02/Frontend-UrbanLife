<main class="tablero">
    <header class="pagina-header">
        <h1 class="pagina-header__titulo">Movimientos<br>Financieros</h1>
        <div class="buscador">
            <div class="buscador__campo">
                <i class="fa-solid fa-magnifying-glass buscador__icono"></i>
                <input type="text" class="buscador__input" placeholder="Buscar por concepto o ID...">
            </div>
            <div class="buscador__filtros">
                <select class="buscador__select" name="filtro-tipo" title="Filtrar por tipo">
                    <option value="">Tipo</option>
                    <option value="Venta">Venta</option>
                    <option value="Compra">Compra</option>
                    <option value="Gasto Adicional">Gasto Adicional</option>
                </select>
                <select class="buscador__select" name="filtro-naturaleza" title="Filtrar por naturaleza">
                    <option value="">Naturaleza</option>
                    <option value="Ingreso">Ingreso</option>
                    <option value="Egreso">Egreso</option>
                </select>
                <select class="buscador__select" name="filtro-periodo" title="Filtrar por periodo">
                    <option value="">Periodo</option>
                    <option value="today">Hoy</option>
                    <option value="week">Esta semana</option>
                    <option value="month">Este mes</option>
                    <option value="year">Este año</option>
                    <option value="custom">Personalizado</option>
                </select>
                <div class="buscador__rango-fechas">
                    <input type="date" class="buscador__date" name="filtro-desde" title="Desde">
                    <span class="buscador__separador">—</span>
                    <input type="date" class="buscador__date" name="filtro-hasta" title="Hasta">
                </div>
            </div>
        </div>
    </header>

    <!-- Tarjetas resumen -->
    <section class="movimientos-resumen">
        <div class="movimientos-resumen__tarjeta movimientos-resumen__tarjeta--ingreso">
            <div class="movimientos-resumen__icono">
                <i class="fa-solid fa-arrow-trend-up"></i>
            </div>
            <div class="movimientos-resumen__info">
                <span class="movimientos-resumen__label">Total Ingresos</span>
                <span class="movimientos-resumen__valor" id="resumen-ingresos">$ ---</span>
            </div>
        </div>
        <div class="movimientos-resumen__tarjeta movimientos-resumen__tarjeta--egreso">
            <div class="movimientos-resumen__icono">
                <i class="fa-solid fa-arrow-trend-down"></i>
            </div>
            <div class="movimientos-resumen__info">
                <span class="movimientos-resumen__label">Total Egresos</span>
                <span class="movimientos-resumen__valor" id="resumen-egresos">$ ---</span>
            </div>
        </div>
        <div class="movimientos-resumen__tarjeta movimientos-resumen__tarjeta--ganancia">
            <div class="movimientos-resumen__icono">
                <i class="fa-solid fa-scale-balanced"></i>
            </div>
            <div class="movimientos-resumen__info">
                <span class="movimientos-resumen__label">Ganancia Neta</span>
                <span class="movimientos-resumen__valor" id="resumen-ganancia">$ ---</span>
            </div>
        </div>
    </section>

    <!-- Tabla de movimientos -->
    <section class="ventas-contenido">
        <div class="tabla__contenedor tabla__contenedor--movimientos">
            <table class="tabla">
                <thead class="tabla__cabecera">
                    <tr>
                        <th class="tabla__th">ID</th>
                        <th class="tabla__th">Fecha</th>
                        <th class="tabla__th">Tipo</th>
                        <th class="tabla__th">Concepto</th>
                        <th class="tabla__th">Naturaleza</th>
                        <th class="tabla__th">Monto</th>
                    </tr>
                </thead>
                <tbody class="tabla__cuerpo">
                    <!-- Las filas se renderizan dinámicamente desde movimientos.js -->
                </tbody>
            </table>
        </div>
    </section>
</main>
